<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ปฏิทินและตารางเวลา</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --bg:          #0f1117;
      --surface:     #181c27;
      --surface2:    #1e2435;
      --border:      #2a3048;
      --gold:        #d4a843;
      --gold-dim:    #9a7520;
      --gold-glow:   rgba(212,168,67,0.15);
      --red:         #e05555;
      --red-dim:     rgba(224,85,85,0.15);
      --green:       #4caf7d;
      --green-dim:   rgba(76,175,125,0.12);
      --text:        #e8eaf0;
      --text-muted:  #7a8299;
      --text-dim:    #4a5270;
      --today:       #d4a843;
      --radius:      14px;
      --radius-sm:   8px;
      --shadow:      0 4px 24px rgba(0,0,0,0.45);
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ===== APP SHELL ===== */
    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ===== HEADER ===== */
    .app-header {
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 50;
    }
    .header-left h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .header-left .subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      margin-top: 1px;
    }
    .header-actions { display: flex; gap: 8px; }
    .btn-icon {
      width: 38px; height: 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.9rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .btn-icon:hover, .btn-icon.active {
      background: var(--gold-glow);
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    /* ===== VIEW TOGGLE ===== */
    .view-toggle {
      display: flex;
      margin: 12px 20px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 3px;
      border: 1px solid var(--border);
    }
    .view-toggle button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      background: transparent;
      transition: all 0.2s;
    }
    .view-toggle button.active {
      background: var(--surface2);
      color: var(--gold);
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }

    /* ===== MONTH NAVIGATION ===== */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 20px 12px;
    }
    .month-nav .nav-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .month-nav .nav-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .month-label {
      text-align: center;
    }
    .month-label .month-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }
    .month-label .year-tag {
      font-size: 0.72rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--gold);
      display: block;
      margin-top: 1px;
    }

    /* ===== MONTH CALENDAR GRID ===== */
    .calendar-view { flex: 1; padding: 0 16px 100px; }

    .weekday-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 6px;
    }
    .weekday-row span {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      padding: 4px 0;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
    }
    .weekday-row span:first-child { color: var(--red); }
    .weekday-row span:last-child  { color: var(--gold-dim); }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-cell {
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .day-cell:hover { background: var(--surface2); }
    .day-cell.empty { cursor: default; }
    .day-cell.other-month .day-num { color: var(--text-dim); }

    .day-cell .day-num {
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1;
    }
    .day-cell.sunday .day-num   { color: var(--red); }
    .day-cell.saturday .day-num { color: #7a9fd4; }

    /* Today highlight */
    .day-cell.today {
      background: var(--gold-glow);
      border-color: var(--gold-dim);
    }
    .day-cell.today .day-num {
      color: var(--gold);
      font-weight: 700;
    }

    /* Selected day */
    .day-cell.selected {
      background: var(--gold);
      border-color: var(--gold);
    }
    .day-cell.selected .day-num { color: #0f1117; font-weight: 700; }
    .day-cell.selected .holiday-dot { background: #0f1117; }
    .day-cell.selected .event-dot  { background: #0f1117; }

    /* Holiday highlight */
    .day-cell.holiday { background: var(--red-dim); border-color: rgba(224,85,85,0.25); }
    .day-cell.holiday .day-num { color: var(--red); }
    .day-cell.holiday.today { background: linear-gradient(135deg, var(--red-dim), var(--gold-glow)); border-color: var(--gold-dim); }

    /* Dots row inside day cell */
    .day-dots {
      display: flex; gap: 2px; margin-top: 3px; height: 5px;
      align-items: center; justify-content: center;
    }
    .holiday-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }
    .event-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
    }

    /* ===== DAY / SCHEDULE VIEW ===== */
    .schedule-view { flex: 1; padding: 0 0 100px; display: none; }

    /* Day strip scroller */
    .day-strip-wrapper {
      padding: 0 20px 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .day-strip-wrapper::-webkit-scrollbar { display: none; }
    .day-strip {
      display: flex;
      gap: 8px;
      min-width: max-content;
    }
    .strip-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.15s;
      min-width: 46px;
      position: relative;
    }
    .strip-day:hover { border-color: var(--gold-dim); }
    .strip-day.active {
      background: var(--gold);
      border-color: var(--gold);
    }
    .strip-day .sd-name {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      font-family: 'IBM Plex Mono', monospace;
    }
    .strip-day .sd-num {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-top: 2px;
    }
    .strip-day.active .sd-name,
    .strip-day.active .sd-num { color: #0f1117; }
    .strip-day.is-today .sd-num { color: var(--gold); }
    .strip-day.is-today.active .sd-num { color: #0f1117; }
    .strip-day.is-holiday { border-color: rgba(224,85,85,0.3); }
    .strip-day.is-holiday .sd-num { color: var(--red); }
    .strip-day.is-holiday.active .sd-num { color: #0f1117; }
    .strip-day-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      margin-top: 4px;
      background: transparent;
    }
    .strip-day.has-events .strip-day-dot { background: var(--gold); }
    .strip-day.active .strip-day-dot   { background: #0f1117; }

    /* Schedule content */
    .schedule-content { padding: 0 20px; }

    .selected-day-header {
      padding: 10px 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .selected-day-info h2 {
      font-size: 1.2rem;
      font-weight: 700;
    }
    .selected-day-info .holiday-badge {
      display: inline-block;
      margin-top: 4px;
      padding: 2px 8px;
      background: var(--red-dim);
      border: 1px solid rgba(224,85,85,0.3);
      border-radius: 20px;
      font-size: 0.72rem;
      color: var(--red);
    }

    .btn-add-event {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 14px;
      background: var(--gold);
      color: #0f1117;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Sarabun', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-add-event:hover { opacity: 0.85; }

    /* Event cards */
    .events-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state i { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.3; display: block; }
    .empty-state p { font-size: 0.88rem; }

    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      position: relative;
      overflow: hidden;
    }
    .event-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--gold);
      border-radius: 2px 0 0 2px;
    }
    .event-card.has-notification::before { background: var(--green); }
    .event-time-col {
      min-width: 52px;
      text-align: center;
    }
    .event-time-col .time-start {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--gold);
      font-weight: 500;
    }
    .event-time-col .time-end {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .event-body { flex: 1; }
    .event-title {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
    }
    .event-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 3px;
      line-height: 1.5;
    }
    .event-tags {
      display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap;
    }
    .tag {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }
    .tag.notify-on  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(76,175,125,0.25); }
    .tag.notify-off { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
    .event-actions {
      display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    }
    .btn-del, .btn-edit {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.75rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .btn-del:hover  { background: var(--red-dim);  border-color: rgba(224,85,85,0.4);  color: var(--red);  }
    .btn-edit:hover { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold); }

    /* ===== BOTTOM FAB (Month view) ===== */
    .fab {
      position: fixed;
      bottom: 28px;
      right: calc(50% - 215px + 20px);
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--gold);
      color: #0f1117;
      font-size: 1.3rem;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(212,168,67,0.45);
      transition: transform 0.15s, opacity 0.15s;
      z-index: 40;
    }
    .fab:hover { transform: scale(1.07); }
    @media (max-width: 430px) {
      .fab { right: 20px; }
    }

    /* ===== MODAL OVERLAY ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(10,12,20,0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-sheet {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 20px 22px 36px;
      transform: translateY(30px);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      max-height: 92dvh;
      overflow-y: auto;
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }
    .modal-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .modal-title i { color: var(--gold); }

    /* Form fields */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--gold-dim); }
    .form-group textarea { resize: none; height: 80px; }

    .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Toggle switch */
    .notify-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 18px;
    }
    .notify-label { display: flex; align-items: center; gap: 10px; }
    .notify-label i { color: var(--gold); font-size: 1rem; }
    .notify-label span { font-size: 0.88rem; font-weight: 500; }
    .notify-sub { font-size: 0.72rem; color: var(--text-muted); display: block; }

    .toggle {
      position: relative;
      width: 44px; height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--text-muted);
      top: 3px; left: 3px;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .slider { background: var(--green-dim); }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
      background: var(--green);
    }

    /* Action buttons */
    .modal-actions { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1;
      padding: 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: 'Sarabun', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { border-color: var(--text-dim); color: var(--text); }
    .btn-save {
      flex: 2;
      padding: 13px;
      background: var(--gold);
      border: none;
      border-radius: var(--radius-sm);
      color: #0f1117;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }

    /* ===== IN-APP TOAST NOTIFICATION ===== */
    .toast-container {
      position: fixed;
      top: 70px; left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      width: 90%; max-width: 380px;
      pointer-events: none;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex; align-items: flex-start; gap: 12px;
      box-shadow: var(--shadow);
      width: 100%;
      animation: slideDown 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
      pointer-events: all;
    }
    .toast.bell { border-left: 3px solid var(--green); }
    .toast.info  { border-left: 3px solid var(--gold); }
    .toast-icon { font-size: 1.1rem; margin-top: 1px; }
    .toast.bell .toast-icon { color: var(--green); }
    .toast.info  .toast-icon { color: var(--gold); }
    .toast-body .toast-title { font-size: 0.88rem; font-weight: 700; }
    .toast-body .toast-msg   { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== HOLIDAY TOOLTIP ===== */
    .holiday-modal {
      position: fixed; inset: 0;
      z-index: 90;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .holiday-modal.show { opacity: 1; pointer-events: all; }
    .holiday-card {
      background: var(--surface);
      border: 1px solid rgba(224,85,85,0.3);
      border-radius: var(--radius);
      padding: 18px 22px;
      max-width: 280px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .holiday-card i { font-size: 1.8rem; color: var(--red); margin-bottom: 8px; }
    .holiday-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .holiday-card p  { font-size: 0.8rem; color: var(--text-muted); }
    .holiday-card .dismiss-btn {
      margin-top: 14px;
      padding: 8px 20px;
      background: var(--red-dim);
      border: 1px solid rgba(224,85,85,0.3);
      border-radius: var(--radius-sm);
      color: var(--red);
      font-family: 'Sarabun', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <h1>ปฏิทิน <span style="color:var(--gold)">✦</span></h1>
      <span class="subtitle" id="headerDate">กำลังโหลด...</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="btnToday" title="วันนี้">
        <i class="fa-regular fa-circle-dot"></i>
      </button>
      <button class="btn-icon" id="btnNotifPerm" title="ขอสิทธิ์แจ้งเตือน">
        <i class="fa-regular fa-bell"></i>
      </button>
    </div>
  </header>

  <!-- VIEW TOGGLE -->
  <div class="view-toggle">
    <button id="btnMonthView" class="active">
      <i class="fa-regular fa-calendar"></i> รายเดือน
    </button>
    <button id="btnDayView">
      <i class="fa-solid fa-list-ul"></i> ตารางเวลา
    </button>
  </div>

  <!-- MONTH NAV (shared) -->
  <div class="month-nav" id="monthNav">

// ============================================================
//  STATE
// ============================================================
const today    = new Date();
today.setHours(0,0,0,0);

let curYear    = today.getFullYear();
let curMonth   = today.getMonth();      // 0-based
let selectedDate = fmtDate(today);       // "YYYY-MM-DD"
let currentView  = 'month';             // 'month' | 'day'

// ============================================================
//  LOCAL STORAGE HELPERS
// ============================================================
function loadEvents() {
  try { return JSON.parse(localStorage.getItem('calEvents') || '{}'); }
  catch(e) { return {}; }
}
function saveEvents(data) {
  localStorage.setItem('calEvents', JSON.stringify(data));
}

// ============================================================
//  UTILITIES
// ============================================================
function fmtDate(d) {
  // Returns "YYYY-MM-DD" from a Date object
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function parseDate(str) {
  // "YYYY-MM-DD" → Date (midnight local)
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function thaiMonthName(m) {
  const names = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                  'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  return names[m];
}
function thaiDayShort(d) {
  // d = 0 (Sun) … 6 (Sat)
  return ['อา','จ','อ','พ','พฤ','ศ','ส'][d];
}
function thaiDayFull(d) {
  return ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'][d];
}

function isToday(dateStr) { return dateStr === fmtDate(today); }
function isHoliday(dateStr) { return !!THAI_HOLIDAYS[dateStr]; }

// Get events for a date key
function getEvents(dateStr) {
  const all = loadEvents();
  return all[dateStr] || [];
}

// ============================================================
//  RENDER: HEADER DATE
// ============================================================
function updateHeaderDate() {
  const d = parseDate(selectedDate);
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('headerDate').textContent =
    d.toLocaleDateString('th-TH', opts);
}

// ============================================================
//  RENDER: MONTH VIEW
// ============================================================
function renderMonth() {
  document.getElementById('monthName').textContent = thaiMonthName(curMonth);
  document.getElementById('yearName').textContent  = `พ.ศ. ${curYear+543} · ค.ศ. ${curYear}`;

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  const firstDay  = new Date(curYear, curMonth, 1).getDay(); // 0=Sun
  const daysInMon = new Date(curYear, curMonth+1, 0).getDate();
  const prevDays  = new Date(curYear, curMonth, 0).getDate();
  const allEvents = loadEvents();

  // Fill leading blanks with prev-month dates (greyed)
  for (let i = 0; i < firstDay; i++) {
    const day = prevDays - firstDay + 1 + i;
    const cell = makeDayCell(curYear, curMonth-1, day, true, allEvents);
    grid.appendChild(cell);
  }

  // Current month days
  for (let d = 1; d <= daysInMon; d++) {
    const cell = makeDayCell(curYear, curMonth, d, false, allEvents);
    grid.appendChild(cell);
  }

  // Trailing blanks
  const total = firstDay + daysInMon;
  const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= trailing; d++) {
    const cell = makeDayCell(curYear, curMonth+1, d, true, allEvents);
    grid.appendChild(cell);
  }
}

function makeDayCell(y, m, d, otherMonth, allEvents) {
  const realDate = new Date(y, m, d);
  const dateStr  = fmtDate(realDate);
  const dow      = realDate.getDay();

  const cell = document.createElement('div');
  cell.className = 'day-cell';
  if (otherMonth)   cell.classList.add('other-month');
  if (dow === 0)    cell.classList.add('sunday');
  if (dow === 6)    cell.classList.add('saturday');
  if (isToday(dateStr))      cell.classList.add('today');
  if (dateStr === selectedDate) cell.classList.add('selected');
  if (isHoliday(dateStr) && !otherMonth) cell.classList.add('holiday');

  // Day number
  const numSpan = document.createElement('span');
  numSpan.className = 'day-num';
  numSpan.textContent = d;
  cell.appendChild(numSpan);

  // Dots (holiday + event indicators)
  const dots = document.createElement('div');
  dots.className = 'day-dots';
  if (isHoliday(dateStr) && !otherMonth) {
    const hd = document.createElement('span');
    hd.className = 'holiday-dot';
    dots.appendChild(hd);
  }
  const evts = allEvents[dateStr];
  if (evts && evts.length > 0) {
    const ed = document.createElement('span');
    ed.className = 'event-dot';
    dots.appendChild(ed);
  }
  cell.appendChild(dots);

  // Click handler
  cell.addEventListener('click', () => {
    if (otherMonth) {
      // Navigate to that month
      curYear  = realDate.getFullYear();
      curMonth = realDate.getMonth();
      selectedDate = dateStr;
      renderMonth();
      updateHeaderDate();
      return;
    }
    const prev = document.querySelector('.day-cell.selected');
    if (prev) prev.classList.remove('selected');
    cell.classList.add('selected');
    selectedDate = dateStr;
    updateHeaderDate();

    // Show holiday popup if applicable
    if (isHoliday(dateStr)) {
      showHolidayModal(dateStr);
    }
  });

  return cell;
}

// ============================================================
//  RENDER: SCHEDULE / DAY VIEW
// ============================================================
function renderDayStrip() {
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = '';
  const allEvents = loadEvents();

  // Show ±15 days around today
  const base = parseDate(selectedDate);
  for (let offset = -15; offset <= 15; offset++) {
    const d = new Date(base);
    d.setDate(d.getDate() + offset);
    const ds = fmtDate(d);
    const el = document.createElement('div');
    el.className = 'strip-day';
    if (ds === selectedDate) el.classList.add('active');
    if (isToday(ds))         el.classList.add('is-today');
    if (isHoliday(ds))       el.classList.add('is-holiday');
    const evList = allEvents[ds];
    if (evList && evList.length) el.classList.add('has-events');

    el.innerHTML = `
      <span class="sd-name">${thaiDayShort(d.getDay())}</span>
      <span class="sd-num">${d.getDate()}</span>
      <span class="strip-day-dot"></span>`;
    el.dataset.dateStr = ds;
    el.addEventListener('click', () => {
      selectedDate = ds;
      renderDayStrip();
      renderScheduleContent();
      updateHeaderDate();
    });
    strip.appendChild(el);
  }

  // Scroll active into center
  const active = strip.querySelector('.active');
  if (active) {
    setTimeout(() => {
      active.scrollIntoView({ inline: 'center', behavior: 'smooth' });
    }, 50);
  }
}

function renderScheduleContent() {
  const d  = parseDate(selectedDate);
  const opts = { weekday:'long', month:'long', day:'numeric' };
  document.getElementById('schedDayTitle').textContent =
    d.toLocaleDateString('th-TH', opts);

  const badge = document.getElementById('schedHolidayBadge');
  if (isHoliday(selectedDate)) {
    badge.textContent = '🚩 ' + THAI_HOLIDAYS[selectedDate];
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }

  renderEventList();
}

function renderEventList() {
  const list   = document.getElementById('schedEventList');
  const events = getEvents(selectedDate);
  list.innerHTML = '';

  if (events.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <i class="fa-regular fa-calendar-xmark"></i>
        <p>ยังไม่มีกิจกรรมในวันนี้<br>กดปุ่ม "เพิ่มกิจกรรม" เพื่อเริ่มต้น</p>
      </div>`;
    return;
  }

  // Sort by start time
  events.sort((a,b) => (a.start||'').localeCompare(b.start||''));

  events.forEach((ev, idx) => {
    const card = document.createElement('div');
    card.className = 'event-card' + (ev.notify ? ' has-notification' : '');
    card.innerHTML = `
      <div class="event-time-col">
        <div class="time-start">${ev.start || '—'}</div>
        <div class="time-end">${ev.end || ''}</div>
      </div>
      <div class="event-body">
        <div class="event-title">${escHtml(ev.title)}</div>
        ${ev.desc ? `<div class="event-desc">${escHtml(ev.desc)}</div>` : ''}
        <div class="event-tags">
          <span class="tag ${ev.notify ? 'notify-on' : 'notify-off'}">
            <i class="fa-solid fa-bell${ev.notify ? '' : '-slash'}"></i>
            ${ev.notify ? 'แจ้งเตือน ON' : 'แจ้งเตือน OFF'}
          </span>
        </div>
      </div>
      <div class="event-actions">
        <button class="btn-edit" data-idx="${idx}" title="แก้ไขกิจกรรม">
          <i class="fa-solid fa-pen"></i>
        </button>
        <button class="btn-del" data-idx="${idx}" title="ลบกิจกรรม">
          <i class="fa-solid fa-trash-can"></i>
        </button>
      </div>`;
    list.appendChild(card);
  });

  // Delete & Edit handlers
  list.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', () => deleteEvent(parseInt(btn.dataset.idx)));
  });
  list.querySelectorAll('.btn-edit').forEach(btn => {
    btn.addEventListener('click', () => openEditEventModal(parseInt(btn.dataset.idx)));
  });
}

// ============================================================
//  EVENT CRUD
// ============================================================
function deleteEvent(idx) {
  const all = loadEvents();
  if (!all[selectedDate]) return;
  all[selectedDate].splice(idx, 1);
  if (all[selectedDate].length === 0) delete all[selectedDate];
  saveEvents(all);
  renderEventList();
  renderMonth();        // refresh dots
  renderDayStrip();
  showToast('info', 'ลบกิจกรรมแล้ว', 'ลบกิจกรรมออกจากรายการสำเร็จ');
}

// ============================================================
//  MODAL: ADD / EDIT EVENT
//  editingIdx = null  → โหมดเพิ่มใหม่
//  editingIdx = number → โหมดแก้ไข (index ใน array ของวันนั้น)
// ============================================================
let editingIdx = null; // track ว่ากำลัง edit event index ไหน

function openAddEventModal() {
  editingIdx = null;
  const d  = parseDate(selectedDate);
  const lb = d.toLocaleDateString('th-TH', { weekday:'long', month:'long', day:'numeric' });
  document.getElementById('modalDateLabel').textContent  = lb;
  document.getElementById('modalTitleText').textContent  = 'เพิ่มกิจกรรม';
  document.getElementById('modalIcon').className         = 'fa-solid fa-calendar-plus';
  document.getElementById('btnSaveEvent').innerHTML      = '<i class="fa-solid fa-floppy-disk"></i> บันทึกกิจกรรม';
  // clear form
  document.getElementById('evtTitle').value    = '';
  document.getElementById('evtStart').value    = '';
  document.getElementById('evtEnd').value      = '';
  document.getElementById('evtDesc').value     = '';
  document.getElementById('evtNotify').checked = false;
  document.getElementById('eventModal').classList.add('open');
  setTimeout(() => document.getElementById('evtTitle').focus(), 350);
}

function openEditEventModal(idx) {
  const events = getEvents(selectedDate);
  const ev = events[idx];
  if (!ev) return;

  editingIdx = idx; // จำ index ที่จะแก้ไข
  const d  = parseDate(selectedDate);
  const lb = d.toLocaleDateString('th-TH', { weekday:'long', month:'long', day:'numeric' });
  document.getElementById('modalDateLabel').textContent  = lb;
  document.getElementById('modalTitleText').textContent  = 'แก้ไขกิจกรรม';
  document.getElementById('modalIcon').className         = 'fa-solid fa-pen-to-square';
  document.getElementById('btnSaveEvent').innerHTML      = '<i class="fa-solid fa-floppy-disk"></i> บันทึกการแก้ไข';
  // โหลดข้อมูลเดิมเข้า form
  document.getElementById('evtTitle').value    = ev.title  || '';
  document.getElementById('evtStart').value    = ev.start  || '';
  document.getElementById('evtEnd').value      = ev.end    || '';
  document.getElementById('evtDesc').value     = ev.desc   || '';
  document.getElementById('evtNotify').checked = ev.notify || false;
  document.getElementById('eventModal').classList.add('open');
  setTimeout(() => document.getElementById('evtTitle').focus(), 350);
}

function closeAddEventModal() {
  document.getElementById('eventModal').classList.remove('open');
  editingIdx = null;
}

function saveNewEvent() {
  const title = document.getElementById('evtTitle').value.trim();
  if (!title) {
    document.getElementById('evtTitle').focus();
    document.getElementById('evtTitle').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('evtTitle').style.borderColor = '', 1500);
    return;
  }

  const all = loadEvents();
  if (!all[selectedDate]) all[selectedDate] = [];

  if (editingIdx !== null) {
    // ===== โหมด EDIT: แก้ไข event เดิม =====
    const old = all[selectedDate][editingIdx] || {};
    all[selectedDate][editingIdx] = {
      id:     old.id || Date.now(), // คง id เดิมไว้
      title,
      start:  document.getElementById('evtStart').value,
      end:    document.getElementById('evtEnd').value,
      desc:   document.getElementById('evtDesc').value.trim(),
      notify: document.getElementById('evtNotify').checked,
    };
    saveEvents(all);
    closeAddEventModal();
    renderMonth();
    renderDayStrip();
    renderEventList();
    showToast('info', 'แก้ไขกิจกรรมแล้ว', `"${title}" อัปเดตเรียบร้อย`);
  } else {
    // ===== โหมด ADD: เพิ่ม event ใหม่ =====
    const ev = {
      id:     Date.now(),
      title,
      start:  document.getElementById('evtStart').value,
      end:    document.getElementById('evtEnd').value,
      desc:   document.getElementById('evtDesc').value.trim(),
      notify: document.getElementById('evtNotify').checked,
    };
    all[selectedDate].push(ev);
    saveEvents(all);
    closeAddEventModal();
    renderMonth();
    renderDayStrip();
    renderEventList();
    showToast('info', 'บันทึกกิจกรรมแล้ว', `"${title}" ถูกเพิ่มในวันที่เลือก`);
    if (ev.notify && ev.start) scheduleNotification(ev);
  }
}

// ============================================================
//  WEB NOTIFICATION API
// ============================================================
async function requestNotifPermission() {
  if (!('Notification' in window)) {
    showToast('info', 'ไม่รองรับ', 'เบราว์เซอร์นี้ไม่รองรับการแจ้งเตือน');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    showToast('bell', 'เปิดการแจ้งเตือนแล้ว', 'ระบบจะแจ้งเตือนเมื่อถึงเวลากิจกรรม');
    document.getElementById('btnNotifPerm').classList.add('active');
  } else {
    showToast('info', 'ถูกปฏิเสธ', 'กรุณาอนุญาตการแจ้งเตือนในการตั้งค่าเบราว์เซอร์');
  }
}

function scheduleNotification(ev) {
  /* สร้าง timeout เพื่อยิง Web Notification เมื่อถึงเวลาของ event
     (ใช้ได้เฉพาะเซสชันนี้ — หน้าต้องเปิดอยู่)  */
  if (!('Notification' in window) || Notification.permission !== 'granted') return;

  const [h, m] = ev.start.split(':').map(Number);
  const target = parseDate(selectedDate);
  target.setHours(h, m, 0, 0);
  const ms = target.getTime() - Date.now();
  if (ms < 0) return; // เวลาผ่านไปแล้ว

  setTimeout(() => {
    new Notification('⏰ แจ้งเตือนกิจกรรม', {
      body: `${ev.title}${ev.desc ? '\n' + ev.desc : ''}`,
      icon: 'https://cdn-icons-png.flaticon.com/512/1827/1827392.png',
    });
    // Also show in-app toast
    showToast('bell', '⏰ ' + ev.title, ev.start + (ev.desc ? ' · ' + ev.desc : ''), 6000);
  }, ms);
}

// ============================================================
//  IN-APP TOAST
// ============================================================
function showToast(type, title, msg, duration = 3500) {
  const icon  = type === 'bell' ? 'fa-bell' : 'fa-circle-info';
  const cont  = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <i class="fa-solid ${icon} toast-icon"></i>
    <div class="toast-body">
      <div class="toast-title">${title}</div>
      ${msg ? `<div class="toast-msg">${escHtml(msg)}</div>` : ''}
    </div>`;
  cont.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateY(-8px)';
    toast.style.transition = 'all 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// ============================================================
//  HOLIDAY MODAL
// ============================================================
function showHolidayModal(dateStr) {
  const d = parseDate(dateStr);
  document.getElementById('holidayName').textContent = THAI_HOLIDAYS[dateStr];
  document.getElementById('holidayDate').textContent =
    d.toLocaleDateString('th-TH', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  document.getElementById('holidayModal').classList.add('show');
}

document.getElementById('dismissHoliday').addEventListener('click', () => {
  document.getElementById('holidayModal').classList.remove('show');
});

// ============================================================
//  VIEW SWITCHING
// ============================================================
function switchView(view) {
  currentView = view;
  const mv = document.getElementById('monthView');
  const sv = document.getElementById('scheduleView');
  const fab = document.getElementById('fabAdd');
  const mn = document.getElementById('monthNav');
  const btnM = document.getElementById('btnMonthView');
  const btnD = document.getElementById('btnDayView');

  if (view === 'month') {
    mv.style.display = 'block';
    sv.style.display = 'none';
    fab.style.display = 'flex';
    mn.style.display  = 'flex';
    btnM.classList.add('active');
    btnD.classList.remove('active');
    renderMonth();
  } else {
    mv.style.display = 'none';
    sv.style.display = 'block';
    fab.style.display = 'none';
    mn.style.display  = 'none';
    btnM.classList.remove('active');
    btnD.classList.add('active');
    renderDayStrip();
    renderScheduleContent();
  }
}

// ============================================================
//  NAVIGATION
// ============================================================
document.getElementById('btnPrev').addEventListener('click', () => {
  curMonth--;
  if (curMonth < 0) { curMonth = 11; curYear--; }
  renderMonth();
});
document.getElementById('btnNext').addEventListener('click', () => {
  curMonth++;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  renderMonth();
});
document.getElementById('btnToday').addEventListener('click', () => {
  selectedDate = fmtDate(today);
  curYear  = today.getFullYear();
  curMonth = today.getMonth();
  updateHeaderDate();
  if (currentView === 'month') renderMonth();
  else { renderDayStrip(); renderScheduleContent(); }
});

// ============================================================
//  EVENT LISTENERS
// ============================================================
document.getElementById('btnMonthView').addEventListener('click', () => switchView('month'));
document.getElementById('btnDayView').addEventListener('click',   () => switchView('day'));

document.getElementById('fabAdd').addEventListener('click', openAddEventModal);
document.getElementById('btnAddEventSched').addEventListener('click', openAddEventModal);

document.getElementById('btnCancelModal').addEventListener('click', closeAddEventModal);
document.getElementById('btnSaveEvent').addEventListener('click', saveNewEvent);

document.getElementById('btnNotifPerm').addEventListener('click', requestNotifPermission);

// Close modal on overlay click
document.getElementById('eventModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddEventModal();
});

// ============================================================
//  NOTIFICATION SCHEDULER: reschedule on load
//  เมื่อรีเฟรชหน้า ให้ตรวจกิจกรรมวันนี้ที่เปิดแจ้งเตือนไว้ใหม่
// ============================================================
function rescheduleOnLoad() {
  const all = loadEvents();
  const todayStr = fmtDate(today);
  const evts = all[todayStr] || [];
  evts.forEach(ev => {
    if (ev.notify && ev.start) scheduleNotification(ev);
  });
}

// ============================================================
//  ESCAPE HTML (prevent XSS)
// ============================================================
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
//  INIT
// ============================================================
function init() {
  updateHeaderDate();
  switchView('month');
  rescheduleOnLoad();

  // Check if notification already granted
  if ('Notification' in window && Notification.permission === 'granted') {
    document.getElementById('btnNotifPerm').classList.add('active');
  }
}

init();
</script>
